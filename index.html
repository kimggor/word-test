<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>국어 낱말 카드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- ── 헤더 ── -->
    <header>
      <div class="logo">국어<span>.</span>카드</div>
      <div class="header-right">
        <button class="btn-shuffle" id="btnShuffle">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="16 3 21 3 21 8" />
            <line x1="4" y1="20" x2="21" y2="3" />
            <polyline points="21 16 21 21 16 21" />
            <line x1="15" y1="15" x2="21" y2="21" />
          </svg>
          섞기
        </button>
      </div>
    </header>

    <!-- ── 카테고리 탭 ── -->
    <div class="tabs-wrap" id="tabsWrap">
      <button class="tab active" data-cat="all">전체</button>
      <button class="tab" data-cat="단어">단어</button>
      <button class="tab" data-cat="띄어쓰기">띄어쓰기</button>
      <button class="tab" data-cat="문법">문법</button>
    </div>

    <!-- ── 진행 바 ── -->
    <div class="progress-wrap">
      <div class="progress-bar-bg">
        <div
          class="progress-bar-fill"
          id="progressFill"
          style="width: 0%"
        ></div>
      </div>
      <span class="progress-text" id="progressText">1 / 1</span>
    </div>

    <!-- ── 메인 ── -->
    <main>
      <div class="stage" id="stage">
        <!-- 화살표 -->
        <button class="arrow left" id="btnPrev" aria-label="이전 카드">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </button>

        <!-- 카드 뷰포트 -->
        <div class="card-viewport" id="cardViewport">
          <div class="card-inner" id="cardInner">
            <!-- 앞면 -->
            <div class="card-face card-front">
              <span class="card-badge" id="cardBadge">단어</span>
              <div class="card-word" id="cardWord"></div>
              <div class="card-sub" id="cardSub"></div>
              <div class="card-hint">
                <svg
                  width="12"
                  height="12"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="15 3 21 3 21 9" />
                  <polyline points="9 21 3 21 3 15" />
                  <line x1="21" y1="3" x2="14" y2="10" />
                  <line x1="3" y1="21" x2="10" y2="14" />
                </svg>
                클릭하여 뒤집기
              </div>
            </div>

            <!-- 뒷면 -->
            <div class="card-face card-back">
              <span class="card-badge" id="cardBadgeBack">단어</span>
              <div class="card-meaning" id="cardMeaning"></div>
              <div class="card-example" id="cardExample"></div>
              <div class="card-hint">
                <svg
                  width="12"
                  height="12"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="15 3 21 3 21 9" />
                  <polyline points="9 21 3 21 3 15" />
                  <line x1="21" y1="3" x2="14" y2="10" />
                  <line x1="3" y1="21" x2="10" y2="14" />
                </svg>
                클릭하여 뒤집기
              </div>
            </div>
          </div>
        </div>

        <!-- 완료 화면 -->
        <div class="complete-screen" id="completeScreen">
          <div class="complete-emoji">🎉</div>
          <div class="complete-title">모두 완료!</div>
          <div class="complete-sub">
            이 세트의 카드를 모두 확인했어요.<br />다시 한번 복습해볼까요?
          </div>
          <button class="btn-restart" id="btnRestart">다시 시작하기</button>
        </div>

        <button class="arrow right" id="btnNext" aria-label="다음 카드">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="9 18 15 12 9 6" />
          </svg>
        </button>
      </div>
    </main>

    <!-- ── 하단 ── -->
    <footer>
      <div class="dot-nav" id="dotNav"></div>
      <div class="action-row">
        <button class="btn-action" id="btnMark">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polygon
              points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
            />
          </svg>
          즐겨찾기
        </button>
        <button class="btn-action danger" id="btnSkip">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="5" y1="12" x2="19" y2="12" />
            <polyline points="12 5 19 12 12 19" />
          </svg>
          건너뛰기
        </button>
      </div>
    </footer>

    <!-- ── 토스트 ── -->
    <div class="toast" id="toast"></div>

    <!-- index.js -->
    <script src="js/index.js"></script>
  </body>
</html>
